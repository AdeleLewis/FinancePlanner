# Test profile: an isolated in-memory database so tests never touch the real ./data/budget file DB.
# Activated by @ActiveProfiles("test") on @SpringBootTest classes. Merges over the base application.yml,
# so connector/security config there still applies.
spring:
  datasource:
    url: jdbc:h2:mem:budget-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
