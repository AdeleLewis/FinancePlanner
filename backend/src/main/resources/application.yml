spring:
  application:
    name: budget
  # Default datasource is the embedded H2 file DB (fine for single-user localhost).
  # Activate the "postgres" profile (SPRING_PROFILES_ACTIVE=postgres) to point at Postgres instead.
  datasource:
    url: jdbc:h2:file:./data/budget;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  # H2 web console disabled — it would expose the database (including secret columns) over HTTP.
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

app:
  # Encryption key for secret columns at rest (bank tokens / API keys). Supply a long, random value via
  # the APP_ENCRYPTION_KEY environment variable. If blank, secrets are stored in PLAINTEXT (dev only) and
  # the app logs a warning on startup. Keep this stable — rotating it cannot decrypt existing rows.
  security:
    encryption-key: ${APP_ENCRYPTION_KEY:}

  # Bank/brokerage connector credentials. Leave blank to keep a connector visible but disabled.
  # Supply real values via environment variables (never commit secrets):
  #   Monzo  -> register a *confidential* client at https://developers.monzo.com to get a refresh token
  #   Plaid  -> https://dashboard.plaid.com (Santander + Amex are reached through Plaid)
  #   Trading 212 -> no server config; each connection brings its own in-app API key
  connectors:
    monzo:
      client-id: ${MONZO_CLIENT_ID:}
      client-secret: ${MONZO_CLIENT_SECRET:}
      redirect-uri: ${MONZO_REDIRECT_URI:http://localhost:8080/api/connections/monzo/callback}
    trading212:
      environment: ${TRADING212_ENV:live}   # "live" or "demo"
    plaid:
      client-id: ${PLAID_CLIENT_ID:}
      secret: ${PLAID_SECRET:}
      environment: ${PLAID_ENV:sandbox}      # "sandbox", "development" or "production"
